<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="t d">
  <title id="t">Mythos — a world development environment for novelists</title>
  <desc id="d">Mythos reads your whole series like a compiler reads a codebase and flags continuity errors — here, a character referenced after the chapter that killed them.</desc>

  <rect width="1200" height="380" rx="24" fill="#0B0E15"/>
  <rect x="1" y="1" width="1198" height="378" rx="23" fill="none" stroke="#20242f"/>
  <path d="M56 74H1144M56 306H1144" stroke="#1b2130"/>

  <!-- eyebrow / masthead -->
  <text x="56" y="50" fill="#C9A24B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="3">LOCAL-FIRST WORLD DEVELOPMENT ENVIRONMENT</text>
  <text x="1144" y="50" text-anchor="end" fill="#7E869A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2">MYTHOS-IDE</text>

  <!-- title block (left) -->
  <text x="56" y="150" fill="#E8DFCB" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="600">Mythos</text>
  <text x="58" y="196" fill="#B9B4A4" font-family="Georgia, 'Times New Roman', serif" font-size="21">The structural discipline of Scrivener, merged</text>
  <text x="58" y="224" fill="#B9B4A4" font-family="Georgia, 'Times New Roman', serif" font-size="21">with the contextual intelligence of an IDE.</text>
  <text x="58" y="270" fill="#8b93a3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="1.5">RUST ENGINE &#183; PLAIN .md + YAML &#183; NO NETWORK PORT &#183; OPEN SOURCE</text>

  <!-- signature: the narrative diagnostic (right) -->
  <g transform="translate(680 96)">
    <rect x="0" y="0" width="416" height="196" rx="8" fill="#0E1220" stroke="#20242f"/>
    <!-- editor bar -->
    <path d="M0 30H416" stroke="#1b2130"/>
    <circle cx="18" cy="15" r="3.5" fill="#20242f"/>
    <text x="34" y="19" fill="#7E869A" font-family="ui-monospace, monospace" font-size="10">book-02 / ch-03-the-tidewatch.md</text>
    <!-- prose lines -->
    <text x="18" y="58" fill="#556" font-family="ui-monospace, monospace" font-size="11">43</text>
    <text x="44" y="58" fill="#E8DFCB" font-family="Georgia, serif" font-size="15">When <tspan fill="#E8DFCB">Lord Corvath</tspan> rose to speak, even</text>
    <path d="M79 63 q7 -3 14 0 t14 0 t14 0 t14 0 t14 0" fill="none" stroke="#D2664F" stroke-width="1.5"/>
    <text x="18" y="82" fill="#556" font-family="ui-monospace, monospace" font-size="11">44</text>
    <text x="44" y="82" fill="#8b93a3" font-family="Georgia, serif" font-size="15">the Tidewatch fell silent, and listened.</text>
    <!-- problems panel -->
    <path d="M0 104H416" stroke="#20242f"/>
    <rect x="0" y="104" width="416" height="92" rx="0" fill="#1a0f0c" opacity="0.5"/>
    <text x="18" y="126" fill="#7E869A" font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="1.5">PROBLEMS</text>
    <text x="398" y="126" text-anchor="end" fill="#D2664F" font-family="ui-monospace, monospace" font-size="9.5">1 ERROR</text>
    <text x="18" y="150" fill="#D2664F" font-family="ui-monospace, monospace" font-size="10.5" font-weight="600">MYTH-E012 &#183; reference to deceased entity</text>
    <text x="18" y="171" fill="#E8DFCB" font-family="Georgia, serif" font-size="13.5"><tspan fill="#C9A24B" font-style="italic">Lord Corvath</tspan> died in Book I, ch. 12 —</text>
    <text x="18" y="188" fill="#B9B4A4" font-family="Georgia, serif" font-size="13.5">he cannot be present here.</text>
  </g>
</svg>
